<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub - Mis Resúmenes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        p.subtitle {
            margin-bottom: 40px;
            color: #64748b;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
        }

        .btn-card {
            background: var(--card-bg);
            border: 1px solid #e2e8f0;
            padding: 25px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: var(--transition);
        }

        .btn-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
            color: var(--primary-color);
        }

        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            z-index: 1000;
            transition: var(--transition);
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: var(--card-bg);
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
            z-index: 1001;
            transition: var(--transition);
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .side-menu.active {
            right: 0;
        }

        .side-menu h2 {
            font-size: 1.2rem;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .menu-link {
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-main);
            border-radius: 8px;
            margin-bottom: 5px;
            transition: background 0.2s;
        }

        .menu-link:hover {
            background: var(--bg-color);
            color: var(--primary-color);
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: none;
            z-index: 999;
        }

        .overlay-bg.active {
            display: block;
        }

        .loading {
            text-align: center;
            color: #64748b;
        }
    </style>
</head>
<body>

    <h1>Knowledge Hub</h1>
    <p class="subtitle">Selecciona una tecnología para ver el resumen</p>

    <div id="gridContainer" class="grid-container">
        <p class="loading">Cargando páginas...</p>
    </div>

    <div class="fab" onclick="toggleMenu()">☰</div>
    <div id="overlay" class="overlay-bg" onclick="toggleMenu()"></div>

    <div id="sideMenu" class="side-menu">
        <h2>Acceso Rápido</h2>
        <div id="menuList"></div>
    </div>

    <script>
        // Obtener el nombre del archivo actual
        const paginaActual = window.location.pathname.split('/').pop() || 'index.html';

        // Función para obtener archivos HTML dinámicamente
        async function cargarPaginas() {
            try {
                // Opción A: Si tienes un archivo JSON con la lista
                const response = await fetch('pages.json');
                let paginas = await response.json();

                // Opción B: Si usas GitHub API (para repositorios públicos)
                // const response = await fetch('https://api.github.com/repos/TU_USUARIO/TU_REPO/contents/');
                // let datos = await response.json();
                // let paginas = datos
                //     .filter(file => file.name.endsWith('.html'))
                //     .map(file => ({ nombre: file.name.replace('.html', ''), url: file.name }));

                // Filtrar la página actual
                paginas = paginas.filter(p => p.url !== paginaActual);

                renderizar(paginas);
            } catch (error) {
                console.error('Error al cargar páginas:', error);
                document.getElementById('gridContainer').innerHTML = 
                    '<p class="loading">Error al cargar las páginas. Usa pages.json o actualiza manualmente.</p>';
            }
        }

        function renderizar(paginas) {
            const gridContainer = document.getElementById('gridContainer');
            const menuList = document.getElementById('menuList');
            
            gridContainer.innerHTML = ''; // Limpiar

            if (paginas.length === 0) {
                gridContainer.innerHTML = '<p class="loading">No hay otras páginas disponibles</p>';
                return;
            }

            paginas.forEach(pg => {
                // Card para la Grid
                const card = document.createElement('a');
                card.href = pg.url;
                card.className = 'btn-card';
                card.innerHTML = `<span>${pg.nombre}</span>`;
                gridContainer.appendChild(card);

                // Enlace para el menú lateral
                const link = document.createElement('a');
                link.href = pg.url;
                link.className = 'menu-link';
                link.innerText = pg.nombre;
                menuList.appendChild(link);
            });
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        // Inicializar
        cargarPaginas();
    </script>
</body>
</html>
